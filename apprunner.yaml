version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - yum install -y cairo cairo-devel libjpeg-devel libpng-devel freetype-devel pkgconfig zlib-devel
    build:
      - pip3 install --upgrade pip
      - pip3 install -r requirements.txt
run:
  command: uvicorn app:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
